server {
    listen 80;
    server_name shawnidea.com www.shawnidea.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name shawnidea.com www.shawnidea.com;

    ssl_certificate /etc/letsencrypt/live/shawnidea.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/shawnidea.com/privkey.pem;

    # Your main site can continue serving / here.
    location = /community {
        return 301 /community/;
    }

    location /community/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
    }
}
