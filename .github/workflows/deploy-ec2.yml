name: Deploy To EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-tech-community
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build
        run: mvn -B clean package -DskipTests

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT || '22' }}
          script_stop: true
          command_timeout: 30m
          script: |
            set -euo pipefail
            cd /var/www/tech-community
            git pull --ff-only origin main
            mvn -B clean package -DskipTests
            sudo systemctl restart tech-community
            sleep 10
            sudo systemctl is-active --quiet tech-community
            curl -fsS http://127.0.0.1:8080/community/login > /dev/null
