name: Deploy To EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-tech-community
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build
        run: mvn -B clean package -DskipTests

      - name: Prepare SSH key
        env:
          EC2_SSH_KEY_B64: ${{ secrets.EC2_SSH_KEY_B64 }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s' "$EC2_SSH_KEY_B64" | base64 --decode > ~/.ssh/tech_community_deploy_key
          chmod 600 ~/.ssh/tech_community_deploy_key
          ssh-keygen -y -f ~/.ssh/tech_community_deploy_key > /dev/null

      - name: Trust EC2 host key
        run: |
          set -euo pipefail
          ssh-keyscan -p "${{ secrets.EC2_PORT }}" -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy on EC2
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/tech_community_deploy_key -p "${{ secrets.EC2_PORT }}" "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" <<'EOF'
            set -euo pipefail
            cd /var/www/tech-community
            git pull --ff-only origin main
            mvn -B clean package -DskipTests
            sudo systemctl restart tech-community
            sleep 10
            sudo systemctl is-active --quiet tech-community
            curl -fsS http://127.0.0.1:8080/community/login > /dev/null
          EOF
