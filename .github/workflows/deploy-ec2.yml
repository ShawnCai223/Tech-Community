name: Deploy To EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: deploy-tech-community
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build
        run: mvn -B clean package -DskipTests

      - name: Prepare SSH key
        env:
          EC2_SSH_KEY_B64: ${{ secrets.EC2_SSH_KEY_B64 }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s' "$EC2_SSH_KEY_B64" | base64 --decode > ~/.ssh/tech_community_deploy_key
          chmod 600 ~/.ssh/tech_community_deploy_key
          ssh-keygen -y -f ~/.ssh/tech_community_deploy_key > /dev/null

      - name: Trust EC2 host key
        run: |
          set -euo pipefail
          ssh-keyscan -p "${{ secrets.EC2_PORT }}" -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy on EC2
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/tech_community_deploy_key -p "${{ secrets.EC2_PORT }}" "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" <<'EOF'
            set -uo pipefail
            cd /var/www/tech-community
            git pull --ff-only origin main
            mvn -B clean package -DskipTests
            sudo systemctl restart tech-community
            for i in $(seq 1 24); do
              echo "Health check attempt ${i}/24"
              if sudo systemctl is-active --quiet tech-community; then
                if curl -fsS http://127.0.0.1:8080/community/login > /dev/null; then
                  echo "Deployment health check passed."
                  exit 0
                fi
              else
                echo "tech-community is not active yet."
              fi
              sleep 5
            done
            echo "Deployment health check failed."
            sudo systemctl status tech-community --no-pager || true
            journalctl -u tech-community -n 120 --no-pager || true
            exit 1
          EOF
