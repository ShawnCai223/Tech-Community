name: Seed Production Likes

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  seed-likes:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Prepare SSH key
        env:
          EC2_SSH_KEY_B64: ${{ secrets.EC2_SSH_KEY_B64 }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s' "$EC2_SSH_KEY_B64" | base64 --decode > ~/.ssh/tech_community_deploy_key
          chmod 600 ~/.ssh/tech_community_deploy_key
          ssh-keygen -y -f ~/.ssh/tech_community_deploy_key > /dev/null

      - name: Trust EC2 host key
        run: |
          set -euo pipefail
          ssh-keyscan -p "${{ secrets.EC2_PORT }}" -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload and run seed script
        run: |
          set -euo pipefail
          KEY=~/.ssh/tech_community_deploy_key
          PORT="${{ secrets.EC2_PORT }}"
          TARGET="${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}"

          scp -i "$KEY" -P "$PORT" scripts/prod-seed-likes.sh "${TARGET}:/tmp/prod-seed-likes.sh"

          ssh -i "$KEY" -p "$PORT" "$TARGET" <<'OUTER'
            set -eo pipefail
            cd /var/www/tech-community

            # Source all env files that might exist
            for f in .env.prod .env; do
              [ -f "$f" ] && { set -a; . "./$f"; set +a; }
            done

            # Also try to read from systemd service environment
            if [ -z "${COMMUNITY_DATASOURCE_URL:-}" ]; then
              svc_env=$(sudo systemctl show tech-community --property=Environment 2>/dev/null || true)
              if echo "$svc_env" | grep -q 'COMMUNITY_DATASOURCE_URL'; then
                eval "$(echo "$svc_env" | sed 's/^Environment=//' | tr ' ' '\n' | grep 'COMMUNITY_')"
              fi
            fi

            # Also try EnvironmentFile
            if [ -z "${COMMUNITY_DATASOURCE_URL:-}" ]; then
              env_file=$(sudo systemctl show tech-community --property=EnvironmentFiles 2>/dev/null | sed 's/^EnvironmentFiles=//' | tr ' ' '\n' | head -1)
              if [ -n "$env_file" ] && [ -f "$env_file" ]; then
                set -a; . "$env_file"; set +a
              fi
            fi

            echo "=== Debug: COMMUNITY_DATASOURCE_URL=${COMMUNITY_DATASOURCE_URL:-(empty)}"
            echo "=== Debug: COMMUNITY_REDIS_HOST=${COMMUNITY_REDIS_HOST:-(empty)}"

            bash /tmp/prod-seed-likes.sh
            rm -f /tmp/prod-seed-likes.sh
          OUTER
