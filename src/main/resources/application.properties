# ServerProperties
server.port=8080
server.servlet.context-path=/community
spring.profiles.default=dev

# ThymeleafProperties
spring.thymeleaf.cache=false
spring.devtools.livereload.enabled=false

# DataSourceProperties
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.type=com.zaxxer.hikari.HikariDataSource
spring.datasource.hikari.maximum-pool-size=15
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=30000

# MybatisProperties
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.type-aliases-package=com.shawnidea.community.entity
mybatis.configuration.useGeneratedKeys=true
mybatis.configuration.mapUnderscoreToCamelCase=true

# logger
#logging.level.com.shawnidea.community=debug
#logging.file=${user.dir}/data/logs/community/app.log

# MailProperties
spring.mail.host=smtp.resend.com
spring.mail.port=465
spring.mail.protocol=smtps
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.auth=true


# community
community.path.domain=http://localhost:8080
community.path.log=${user.dir}/data/logs

# RedisProperties
spring.data.redis.repositories.enabled=false

# KafkaProperties
spring.kafka.consumer.group-id=community-consumer-group
spring.kafka.consumer.enable-auto-commit=true
spring.kafka.consumer.auto-commit-interval=3000

# ElasticsearchProperties
spring.data.elasticsearch.repositories.enabled=false

# TaskExecutionProperties
spring.task.execution.pool.core-size=5
spring.task.execution.pool.max-size=15
spring.task.execution.pool.queue-capacity=100

# TaskSchedulingProperties
spring.task.scheduling.pool.size=5

# QuartzProperties
spring.quartz.job-store-type=memory
spring.quartz.scheduler-name=communityScheduler
spring.quartz.properties.org.quartz.scheduler.instanceId=AUTO
spring.quartz.properties.org.quartz.threadPool.class=org.quartz.simpl.SimpleThreadPool
spring.quartz.properties.org.quartz.threadPool.threadCount=5

# caffeine
caffeine.posts.max-size=15
caffeine.posts.expire-seconds=180

# JWT
community.jwt.secret=${JWT_SECRET:default-dev-secret-key-change-in-production-at-least-32-chars}
community.jwt.access-expiration-ms=900000
community.jwt.refresh-expiration-ms=604800000

# CORS
community.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}
