# Elasticsearch local integration profile.
# Use together with the default dev profile:
#   mvn spring-boot:run -Dspring-boot.run.profiles=dev,es-local

# ElasticsearchProperties
spring.elasticsearch.uris=localhost:9200
community.elasticsearch.enabled=true
community.elasticsearch.admin-sync.enabled=true

# Recreate the index explicitly through:
#   POST /community/admin/elasticsearch/index?analyzer=standard
# or
#   POST /community/admin/elasticsearch/index?analyzer=ik

# logger
logging.level.org.springframework.data.elasticsearch=info
logging.level.co.elastic.clients=warn
