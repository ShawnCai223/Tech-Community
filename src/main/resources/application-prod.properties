# ThymeleafProperties
spring.thymeleaf.cache=true
server.forward-headers-strategy=framework

# DataSourceProperties
spring.datasource.url=${COMMUNITY_DATASOURCE_URL}
spring.datasource.username=${COMMUNITY_DATASOURCE_USERNAME}
spring.datasource.password=${COMMUNITY_DATASOURCE_PASSWORD}

# MailProperties
spring.mail.username=${COMMUNITY_MAIL_USERNAME}
spring.mail.password=${COMMUNITY_MAIL_PASSWORD}

# community
# Host only. Do not append /community here because the application already
# adds server.servlet.context-path when it generates absolute URLs.
community.path.domain=${COMMUNITY_DOMAIN:https://shawnidea.com}
community.path.upload=${COMMUNITY_UPLOAD_PATH}

# RedisProperties
spring.data.redis.database=${COMMUNITY_REDIS_DATABASE:0}
spring.data.redis.host=${COMMUNITY_REDIS_HOST}
spring.data.redis.port=${COMMUNITY_REDIS_PORT:6379}
spring.data.redis.password=${COMMUNITY_REDIS_PASSWORD:}

# KafkaProperties
spring.kafka.bootstrap-servers=${COMMUNITY_KAFKA_BOOTSTRAP_SERVERS}
community.kafka.enabled=${COMMUNITY_KAFKA_ENABLED:true}

# ElasticsearchProperties
spring.elasticsearch.uris=${COMMUNITY_ELASTICSEARCH_URIS}
community.elasticsearch.enabled=${COMMUNITY_ELASTICSEARCH_ENABLED:true}
community.elasticsearch.admin-sync.enabled=${COMMUNITY_ELASTICSEARCH_ADMIN_SYNC_ENABLED:false}

# wk
wk.image.command=${COMMUNITY_WKHTMLTOIMAGE_COMMAND:/usr/local/bin/wkhtmltoimage}
wk.image.storage=${COMMUNITY_WK_IMAGE_STORAGE}

# Cloudflare R2
community.storage.r2.account-id=${COMMUNITY_R2_ACCOUNT_ID}
community.storage.r2.access-key-id=${COMMUNITY_R2_ACCESS_KEY_ID}
community.storage.r2.secret-access-key=${COMMUNITY_R2_SECRET_ACCESS_KEY}
community.storage.r2.bucket.header=${COMMUNITY_R2_HEADER_BUCKET}
community.storage.r2.bucket.share=${COMMUNITY_R2_SHARE_BUCKET}
community.storage.r2.public-base-url.header=${COMMUNITY_R2_HEADER_PUBLIC_BASE_URL}
community.storage.r2.public-base-url.share=${COMMUNITY_R2_SHARE_PUBLIC_BASE_URL}
